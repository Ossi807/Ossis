name: Build LaneForge APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'dist/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk LaneForge-v0.1-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaneForge-APK
          path: LaneForge-v0.1-debug.apk
          if-no-files-found: error

      - name: Publish direct APK download
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view laneforge-v0.1 >/dev/null 2>&1; then
            gh release upload laneforge-v0.1 LaneForge-v0.1-debug.apk --clobber
          else
            gh release create laneforge-v0.1 LaneForge-v0.1-debug.apk \
              --target "${GITHUB_SHA}" \
              --title "LaneForge v0.1" \
              --notes "Offline Android prototype against bots."
          fi

      - name: Store APK in repository
        run: |
          mkdir -p dist
          cp LaneForge-v0.1-debug.apk dist/LaneForge-v0.1-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/LaneForge-v0.1-debug.apk
          if git diff --cached --quiet; then
            echo "APK unchanged"
          else
            git commit -m "Update direct LaneForge APK [skip ci]"
            git push
          fi
