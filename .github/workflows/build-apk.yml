name: Build LaneForge APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'dist/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Apply improved game UI and easier bot
        shell: bash
        run: |
          cat > /tmp/gameview.b64 <<'GAMEVIEW'
          
          GAMEVIEW
          sed 's/^          //' /tmp/gameview.b64 | base64 -d | gzip -d > app/src/main/java/com/ossi/laneforge/GameView.java
          sed -i "s/versionName '0.1.0'/versionName '0.2.0'/" app/build.gradle

      - name: Build improved debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk LaneForge-v0.2-improved.apk

      - name: Upload APK artifact
        id: upload_apk
        uses: actions/upload-artifact@v4
        with:
          name: LaneForge-Improved-APK
          path: LaneForge-v0.2-improved.apk
          if-no-files-found: error

      - name: Publish direct APK download
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view laneforge-v0.2 >/dev/null 2>&1; then
            gh release upload laneforge-v0.2 LaneForge-v0.2-improved.apk --clobber
          else
            gh release create laneforge-v0.2 LaneForge-v0.2-improved.apk \
              --target "${GITHUB_SHA}" \
              --title "LaneForge v0.2 Improved" \
              --notes "Improved arena UI, recognizable card icons and an easier offline bot."
          fi

      - name: Store APK and artifact reference
        env:
          ARTIFACT_ID: ${{ steps.upload_apk.outputs.artifact-id }}
        run: |
          mkdir -p dist
          cp LaneForge-v0.2-improved.apk dist/LaneForge-v0.2-improved.apk
          printf '{"run_id":%s,"artifact_id":%s,"artifact_name":"LaneForge-Improved-APK"}\n' \
            "${GITHUB_RUN_ID}" "${ARTIFACT_ID}" > dist/build-info.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/LaneForge-v0.2-improved.apk dist/build-info.json
          if git diff --cached --quiet; then
            echo "Build files unchanged"
          else
            git commit -m "Update improved LaneForge APK [skip ci]"
            git push
          fi
