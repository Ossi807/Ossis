plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ossi.laneforge'
    compileSdk 35

    defaultConfig {
        applicationId 'com.ossi.laneforge'
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName '0.1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
